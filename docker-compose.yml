services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zeptalytic_web_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zeptalytic_web_backend"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_NAME: Zeptalytic Web Backend
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/zeptalytic_web_backend
      PAY_SERVICE_BASE_URL: http://pay:8080
      PAY_SERVICE_INTERNAL_TOKEN: replace-me
    ports:
      - "8000:8000"

  migrate:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_NAME: Zeptalytic Web Backend
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/zeptalytic_web_backend
      PAY_SERVICE_BASE_URL: http://pay:8080
      PAY_SERVICE_INTERNAL_TOKEN: replace-me
    command: ["alembic", "upgrade", "head"]

volumes:
  postgres_data:
