services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zeptalytic_web_backend_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zeptalytic_web_backend_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: test
      APP_NAME: Zeptalytic Web Backend
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/zeptalytic_web_backend_test
      PAY_SERVICE_BASE_URL: http://pay:8080
      PAY_SERVICE_INTERNAL_TOKEN: test-token
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/migrate-ready"]
      interval: 2s
      timeout: 2s
      retries: 10
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && touch /tmp/migrate-ready && tail -f /dev/null",
      ]

  test:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_healthy
    environment:
      APP_ENV: test
      APP_NAME: Zeptalytic Web Backend
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/zeptalytic_web_backend_test
      PAY_SERVICE_BASE_URL: http://pay:8080
      PAY_SERVICE_INTERNAL_TOKEN: test-token
    command: ["pytest", "-q"]
